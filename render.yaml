services:
  - type: web
    name: pesportes
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render gera automaticamente
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://pesportes.ia.br
